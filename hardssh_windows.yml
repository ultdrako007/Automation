---
# ============================================================================
# Drakos Cave SOC - SSH PostQuantum Hardening Windows v3
# Fecha: 2026-06-22
# OpenSSH for Windows 9.5 (sntrup761 disponible, mlkem768 NO)
# v3: usa win_powershell inline (sin SFTP/SCP needed)
# ============================================================================
- name: SSH PostQuantum Hardening Windows v3 - Drakos SOC
  hosts: windows
  gather_facts: yes
  serial: 5

  tasks:
    - name: "[1/4] Verificar versión OpenSSH"
      ansible.windows.win_powershell:
        script: |
          (ssh -V 2>&1) -join ''
      register: ssh_version
      changed_when: false

    - name: "[2/4] Asegurar directorio sshd_config.d existe"
      ansible.windows.win_powershell:
        script: |
          $path = 'C:\ProgramData\ssh\sshd_config.d'
          if (-not (Test-Path $path)) {
            New-Item -ItemType Directory -Path $path -Force | Out-Null
            'CREATED'
          } else {
            'EXISTS'
          }

    - name: "[3/4] Escribir drop-in PostQuantum (inline)"
      ansible.windows.win_powershell:
        script: |
          $content = @"
          # ====================================================================
          # Drakos Cave SOC - Post-Quantum KEX hardening
          # Aplicado: 2026-06-22 via Ansible (hardssh_windows.yml v3)
          # OpenSSH for Windows 9.5 (sntrup761 disponible, mlkem768 NO)
          # ====================================================================
          KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
          "@
          $path = 'C:\ProgramData\ssh\sshd_config.d\99-drakos-postquantum.conf'
          Set-Content -Path $path -Value $content -Encoding ASCII -Force
          Restart-Service sshd
          'APPLIED'
      register: pq_apply

    - name: "[4/4] Validar KexAlgorithms efectivos"
      ansible.windows.win_powershell:
        script: |
          $kex = & 'C:\Windows\System32\OpenSSH\sshd.exe' -T 2>$null | Select-String '^kexalgorithms'
          @{
            Host = $env:COMPUTERNAME
            OpenSSH = (ssh -V 2>&1) -join ''
            KexActive = if ($kex) { $kex.Line } else { 'N/A' }
            SshdStatus = (Get-Service sshd).Status.ToString()
          }
      register: validation

    - name: "Reporte por host"
      ansible.builtin.debug:
        var: validation.output
