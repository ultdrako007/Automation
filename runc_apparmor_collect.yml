---
- name: Collect inteligente AppArmor (baseline dinámico)
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    audit_log: /var/log/audit/audit.log
    state_file: /tmp/apparmor_tuning/state.json

  tasks:

  - name: 🔍 Detectar Docker
    command: docker --version
    register: docker_check
    failed_when: false
    changed_when: false

  - name: 🔍 Detectar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  - name: 🧠 Determinar aplicabilidad
    set_fact:
      apparmor_candidate: "{{ docker_check.rc == 0 and runc_check.rc == 0 }}"

  - name: 📁 Crear carpeta
    file:
      path: "{{ working_dir }}"
      state: directory
    when: apparmor_candidate

  - name: 🔍 Extraer logs
    shell: |
      set +e
      grep 'runc' {{ audit_log }} 2>/dev/null | \
      grep -E 'DENIED|apparmor' > {{ working_dir }}/runc_raw.log
      exit 0
    args:
      executable: /bin/bash
    when: apparmor_candidate

  - name: 📊 Validar contenido
    stat:
      path: "{{ working_dir }}/runc_raw.log"
    register: log_file
    when: apparmor_candidate

  - name: 🧠 Marcar host con datos
    set_fact:
      apparmor_active: "{{ apparmor_candidate and log_file.stat.exists and log_file.stat.size > 0 }}"

  - name: 💾 Persistir estado por host
    copy:
      content: |
        {
          "hostname": "{{ inventory_hostname }}",
          "candidate": {{ apparmor_candidate | lower }},
          "active": {{ apparmor_active | default(false) | lower }}
        }
      dest: "{{ working_dir }}/state.json"
    when: apparmor_candidate
