---
- name: Aplicación segura de profile AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    profile_path: /etc/apparmor.d/usr.bin.runc

  tasks:

  - name: 🔍 Verificar reglas generadas
    stat:
      path: "{{ working_dir }}/runc_rules_final.txt"
    register: rules_file

  - name: 🧠 Determinar si aplicar cambios
    set_fact:
      apply_applicable: "{{ rules_file.stat.exists and rules_file.stat.size > 0 }}"

  - name: 📊 Estado Apply
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'APLICAR ✅' if apply_applicable else 'SIN CAMBIOS 🚫' }}

  - name: 💾 Backup profile actual
    copy:
      src: "{{ profile_path }}"
      dest: "{{ profile_path }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    when: apply_applicable
    ignore_errors: yes

  - name: 🔧 Insertar reglas optimizadas
    blockinfile:
      path: "{{ profile_path }}"
      marker: "# {mark} ANSIBLE MANAGED RUNC RULES"
      block: "{{ lookup('file', working_dir + '/runc_rules_final.txt') }}"
    when: apply_applicable

  - name: 🔄 Recargar AppArmor
    command: apparmor_parser -r {{ profile_path }}
    when: apply_applicable

  - name: 🔒 Activar enforce
    command: aa-enforce usr.bin.runc
    when: apply_applicable

  - name: ✅ Validar Docker
    command: docker ps
    register: docker_status
    changed_when: false
    failed_when: false
    when: apply_applicable

  - name: 🚫 Host sin cambios
    debug:
      msg: "No se aplican cambios en este host"
    when: not apply_applicable
