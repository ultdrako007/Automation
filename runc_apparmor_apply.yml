---
- name: Apply AppArmor (final sin errores)
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    profile: /etc/apparmor.d/usr.bin.runc
    cleaned_rules: /tmp/apparmor_tuning/rules.cleaned.txt

  tasks:

  # -------------------------
  # 1. STATE
  # -------------------------
  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  - name: 🧠 Default seguro
    set_fact:
      state:
        active: false
    when: not state_stat.stat.exists

  # -------------------------
  # 2. VALIDACIONES
  # -------------------------
  - name: 🔍 Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  - name: 🔍 Verificar reglas limpias
    stat:
      path: "{{ cleaned_rules }}"
    register: cleaned_stat

  # -------------------------
  # 3. CONDICIÓN FINAL
  # -------------------------
  - name: 🧠 Evaluar ejecución final
    set_fact:
      apply_ready: >
        {{ state.active
           and profile_stat.stat.exists
           and cleaned_stat.stat.exists
           and cleaned_stat.stat.size > 0 }}

  - name: 📊 Estado completo
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'APLICAR ✅' if apply_ready else 'OMITIDO 🚫' }} |
        profile={{ profile_stat.stat.exists }},
        cleaned_rules={{ cleaned_stat.stat.exists }},
        size={{ cleaned_stat.stat.size | default('0') }}

  # -------------------------
  # 4. LEER REGLAS REMOTAS (FIX CLAVE)
  # -------------------------
  - name: 📥 Leer reglas limpias (REMOTO)
    slurp:
      src: "{{ cleaned_rules }}"
    register: rules_content
    when: apply_ready

  # -------------------------
  # 5. BACKUP
  # -------------------------
  - name: 💾 Backup profile
    copy:
      src: "{{ profile }}"
      dest: "{{ profile }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    when: apply_ready

  # -------------------------
  # 6. INSERTAR REGLAS
  # -------------------------
  - name: 🔧 Insertar reglas correctamente
    blockinfile:
      path: "{{ profile }}"
      marker: "# ANSIBLE MANAGED RUNC RULES"
      block: "{{ rules_content.content | b64decode }}"
    when: apply_ready

  # -------------------------
  # 7. VALIDAR SINTAXIS
  # -------------------------
  - name: 🧪 Validar sintaxis AppArmor
    command: apparmor_parser -Q {{ profile }}
    register: syntax_check
    failed_when: false
    changed_when: false
    when: apply_ready

  - name: ❌ Fallar si sintaxis inválida
    fail:
      msg: "Error de sintaxis en AppArmor. Ejecuta rollback."
    when: apply_ready and syntax_check.rc != 0

  # -------------------------
  # 8. APPLY REAL
  # -------------------------
  - name: 🔄 Recargar AppArmor
    command: apparmor_parser -r {{ profile }}
    when: apply_ready and syntax_check.rc == 0

  - name: 🔒 Activar enforce
    command: aa-enforce usr.bin.runc
    when: apply_ready and syntax_check.rc == 0
