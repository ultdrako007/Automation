---
- name: Apply inteligente AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  - name: 🔍 Validar reglas
    stat:
      path: "{{ working_dir }}/rules_optimized.txt"
    register: rules

  - name: 🧠 Determinar aplicación
    set_fact:
      apparmor_active: "{{ rules.stat.exists and rules.stat.size > 0 }}"

  - name: 📊 Estado
    debug:
      msg: "{{ inventory_hostname }} → {{ 'APLICAR ✅' if apparmor_active else 'OMITIDO 🚫' }}"

  - name: 💾 Backup
    copy:
      src: "{{ profile }}"
      dest: "{{ profile }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    when: apparmor_active
    ignore_errors: yes

  - name: 🔧 Insertar reglas
    blockinfile:
      path: "{{ profile }}"
      marker: "# ANSIBLE MANAGED"
      block: "{{ lookup('file', working_dir + '/rules_optimized.txt') }}"
    when: apparmor_active

  - name: 🔄 Recargar AppArmor
    command: apparmor_parser -r {{ profile }}
    when: apparmor_active

  - name: 🔒 Enforce
    command: aa-enforce usr.bin.runc
    when: apparmor_active
``
