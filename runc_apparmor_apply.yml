---
- name: Apply inteligente AppArmor (versión final sin errores)
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  # 🔹 1. Verificar state.json
  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  # 🔹 2. Leer estado solo si existe
  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  # 🔹 3. Parsear estado
  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  # 🔹 4. Default seguro
  - name: 🧠 Estado por defecto
    set_fact:
      state:
        active: false
    when: not state_stat.stat.exists

  # 🔹 5. Verificar profile AppArmor
  - name: 🔍 Verificar profile runc
    stat:
      path: "{{ profile }}"
    register: profile_stat

  # 🔹 6. Verificar reglas generadas
  - name: 🔍 Verificar reglas optimizadas
    stat:
      path: "{{ working_dir }}/rules_optimized.txt"
    register: rules_stat

  # 🔹 7. Determinar si el host está listo
  - name: 🧠 Evaluar condición final
    set_fact:
      apply_ready: >
        {{ state.active
           and profile_stat.stat.exists
           and rules_stat.stat.exists
           and rules_stat.stat.size > 0 }}

  # 🔹 8. Mostrar estado completo (debug clave)
  - name: 📊 Estado Apply detallado
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'APLICAR ✅' if apply_ready else 'OMITIDO 🚫' }} |
        profile={{ profile_stat.stat.exists }},
        rules={{ rules_stat.stat.exists }},
        size={{ rules_stat.stat.size | default('0') }}

  # 🔹 9. Leer reglas desde el HOST REMOTO (FIX CRÍTICO)
  - name: 📥 Leer reglas optimizadas (REMOTO)
    slurp:
      src: "{{ working_dir }}/rules_optimized.txt"
    register: rules_content
    when: apply_ready

  # 🔹 10. Backup del profile
  - name: 💾 Backup profile
    copy:
      src: "{{ profile }}"
      dest: "{{ profile }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    when: apply_ready

  # 🔹 11. Aplicar reglas correctamente
  - name: 🔧 Insertar reglas en profile
    blockinfile:
      path: "{{ profile }}"
      marker: "# ANSIBLE MANAGED RUNC"
      block: "{{ rules_content.content | b64decode }}"
    when: apply_ready

  # 🔹 12. Recargar AppArmor
  - name: 🔄 Recargar AppArmor
    command: apparmor_parser -r {{ profile }}
    when: apply_ready

  # 🔹 13. Enforce (activar protección real)
  - name: 🔒 Activar enforce
    command: aa-enforce usr.bin.runc
    when: apply_ready
