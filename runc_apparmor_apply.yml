---
- name: Deploy baseline AppArmor profile estable (runc)
  hosts: all
  become: yes

  vars:
    profile: /etc/apparmor.d/usr.bin.runc

    baseline_profile: |
      #include <tunables/global>

      profile usr.bin.runc flags=(attach_disconnected,mediate_deleted) {

        #include <abstractions/base>

        # CAPABILITIES
        capability,
        network,
        file,
        mount,

        # LIBS
        /lib/** r,
        /usr/lib/** r,
        /etc/ld.so.cache r,

        # CONTAINER RUNTIME
        /run/containerd/** rw,
        /var/lib/containerd/** rw,
        /var/lib/docker/** rw,
        /opt/containerd/** r,

        # DEVICES
        /dev/** rw,

        # SAFE PROC/SYS ACCESS
        /proc/** r,
        /sys/** r,

        # TEMP FILES
        /tmp/** rw,
        /var/tmp/** rw,

        # DOCKER SOCKET
        /var/run/docker.sock rw,

        # LOGGING
        /var/log/** r,
      }

  tasks:

  # 1. Detectar runc
  - name: Verificar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  # 2. Determinar aplicabilidad
  - name: Validar host
    set_fact:
      apply_profile: "{{ runc_check.rc == 0 }}"

  - name: Estado
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'APLICAR BASELINE ✅' if apply_profile else 'OMITIDO 🚫' }}

  # 3. Backup
  - name: Backup profile existente
    copy:
      src: "{{ profile }}"
      dest: "{{ profile }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    ignore_errors: yes
    when: apply_profile

  # 4. Deploy baseline limpio
  - name: Crear profile limpio
    copy:
      dest: "{{ profile }}"
      content: "{{ baseline_profile }}"
    when: apply_profile

  # 5. Validar sintaxis
  - name: Validar AppArmor
    command: apparmor_parser -Q {{ profile }}
    register: syntax
    failed_when: false
    changed_when: false
    when: apply_profile

  - name: Fallar si inválido
    fail:
      msg: "Baseline inválido (no debería pasar)"
    when: apply_profile and syntax.rc != 0

  # 6. Aplicar
  - name: Recargar AppArmor
    command: apparmor_parser -r {{ profile }}
    when: apply_profile

  - name: Enforce
    command: aa-enforce usr.bin.runc
    when: apply_profile
