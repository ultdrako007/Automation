---
- name: Apply AppArmor (seguro + sintaxis correcta)
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    profile: /etc/apparmor.d/usr.bin.runc
    temp_rules: /tmp/apparmor_tuning/rules.cleaned.txt

  tasks:

  # -------------------------
  # 1. VALIDACIONES
  # -------------------------

  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  - name: 🧠 Default
    set_fact:
      state:
        active: false
    when: not state_stat.stat.exists

  - name: 🔍 Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  - name: 🔍 Verificar reglas
    stat:
      path: "{{ working_dir }}/rules_optimized.txt"
    register: rules_stat

  # -------------------------
  # 2. CONDICIÓN FINAL
  # -------------------------

  - name: 🧠 Evaluar ejecución
    set_fact:
      apply_ready: >
        {{ state.active
           and profile_stat.stat.exists
           and rules_stat.stat.exists
           and rules_stat.stat.size > 0 }}

  - name: 📊 Estado final
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'APLICAR ✅' if apply_ready else 'OMITIDO 🚫' }}

  # -------------------------
  # 3. LIMPIEZA DE REGLAS (CRÍTICO)
  # -------------------------

  - name: 📥 Leer reglas crudas
    slurp:
      src: "{{ working_dir }}/rules_optimized.txt"
    register: rules_content
    when: apply_ready

  - name: 🧹 Limpiar reglas inválidas
    copy:
      dest: "{{ temp_rules }}"
      content: |
        {% for line in (rules_content.content | b64decode).splitlines() %}
        {% if line.startswith('/') and ' ' in line %}
        {{ line }}
        {% endif %}
        {% endfor %}
    when: apply_ready

  # -------------------------
  # 4. BACKUP
  # -------------------------

  - name: 💾 Backup profile
    copy:
      src: "{{ profile }}"
      dest: "{{ profile }}.bak_{{ ansible_date_time.iso8601 }}"
      remote_src: yes
    when: apply_ready

  # -------------------------
  # 5. INSERCIÓN SEGURA
  # -------------------------

  - name: 🔧 Insertar reglas dentro del profile
    blockinfile:
      path: "{{ profile }}"
      marker: "# ANSIBLE MANAGED RUNC RULES"
      block: |
        # Reglas generadas dinámicamente
        {{ lookup('file', temp_rules) }}
    when: apply_ready

  # -------------------------
  # 6. VALIDACIÓN PREVIA (MUY IMPORTANTE)
  # -------------------------

  - name: 🧪 Validar sintaxis antes de aplicar
    command: apparmor_parser -Q {{ profile }}
    register: syntax_check
    failed_when: false
    changed_when: false
    when: apply_ready

  - name: ⚠️ Detener si la sintaxis es inválida
    fail:
      msg: "Error de sintaxis en profile AppArmor, rollback recomendado"
    when: apply_ready and syntax_check.rc != 0

  # -------------------------
  # 7. APLICAR SOLO SI VALIDA
  # -------------------------

  - name: 🔄 Recargar AppArmor
    command: apparmor_parser -r {{ profile }}
    when: apply_ready and syntax_check.rc == 0

  - name: 🔒 Activar enforce
    command: aa-enforce usr.bin.runc
    when: apply_ready and syntax_check.rc == 0
