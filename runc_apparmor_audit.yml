---
- name: Auditoría AppArmor runc (final robusto)
  hosts: all
  become: yes

  vars:
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  ##################################################
  # 1. DETECTAR RUNC
  ##################################################

  - name: Verificar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  - name: Definir runc_present
    set_fact:
      runc_present: "{{ runc_check.rc == 0 }}"

  ##################################################
  # 2. VALIDAR PROFILE
  ##################################################

  - name: Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  ##################################################
  # 3. ESTADO APPARMOR
  ##################################################

  - name: Obtener estado AppArmor (json)
    command: aa-status --json
    register: aa_json
    failed_when: false
    changed_when: false
    when: runc_present

  ##################################################
  # 4. DEFAULT (CLAVE)
  ##################################################

  - name: Definir enforce_active por defecto
    set_fact:
      enforce_active: false

  ##################################################
  # 5. PARSEAR SOLO SI APLICA
  ##################################################

  - name: Detectar enforce real
    set_fact:
      enforce_active: "{{ 'usr.bin.runc' in (aa_json.stdout | default('')) }}"
    when: runc_present and aa_json.stdout is defined
    failed_when: false

  ##################################################
  # 6. VALIDAR BACKUPS
  ##################################################

  - name: Verificar backups conflictivos
    shell: ls /etc/apparmor.d/usr.bin.runc.bak_* 2>/dev/null | wc -l
    register: backup_count
    changed_when: false
    failed_when: false

  ##################################################
  # 7. REPORTE DETALLADO
  ##################################################

  - name: Reporte final
    debug:
      msg: |
        ===== HOST: {{ inventory_hostname }} =====
        runc instalado: {{ runc_present }}
        profile existe: {{ profile_stat.stat.exists }}
        enforce activo: {{ 'SI ✅' if enforce_active else 'NO ⚠️' }}
        backups: {{ backup_count.stdout }}

  ##################################################
  # 8. ESTADO CONSOLIDADO
  ##################################################

  - name: Estado global
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'OK ✅' if (runc_present and profile_stat.stat.exists and enforce_active) else 'N/A o Revisar ⚠️' }}
