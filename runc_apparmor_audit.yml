---
- name: Auditoría AppArmor runc (mejorado)
  hosts: all
  become: yes

  vars:
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  ##################################################
  # 1. DETECTAR RUNC
  ##################################################

  - name: Verificar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  - name: Definir runc_present
    set_fact:
      runc_present: "{{ runc_check.rc == 0 }}"

  ##################################################
  # 2. VALIDAR PROFILE
  ##################################################

  - name: Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  ##################################################
  # 3. ESTADO APPARMOR
  ##################################################

  - name: Obtener estado AppArmor
    command: aa-status --json
    register: aa_json
    failed_when: false
    changed_when: false
    when: runc_present

  - name: Default enforce
    set_fact:
      enforce_active: false

  - name: Detectar enforce real
    set_fact:
      enforce_active: "{{ 'usr.bin.runc' in (aa_json.stdout | default('')) }}"
    when: runc_present

  ##################################################
  # 4. BACKUPS
  ##################################################

  - name: Verificar backups
    shell: ls /etc/apparmor.d/usr.bin.runc.bak_* 2>/dev/null | wc -l
    register: backup_count
    changed_when: false
    failed_when: false

  ##################################################
  # 5. MENSAJE INTELIGENTE
  ##################################################

  - name: Determinar estado final
    set_fact:
      final_status: >
        {% if not runc_present %}
        HOST SIN DOCKER 🚫
        {% elif profile_stat.stat.exists and enforce_active %}
        OK ✅
        {% else %}
        REVISAR ⚠️
        {% endif %}

  ##################################################
  # 6. REPORTE DETALLADO
  ##################################################

  - name: Reporte final
    debug:
      msg: |
        ===== HOST: {{ inventory_hostname }} =====
        runc instalado: {{ runc_present }}
        profile existe: {{ profile_stat.stat.exists }}
        enforce activo: {{ 'SI ✅' if enforce_active else 'NO ⚠️' if runc_present else 'N/A' }}
        backups: {{ backup_count.stdout }}
        estado: {{ final_status }}

  ##################################################
  # 7. RESUMEN SIMPLE
  ##################################################

  - name: Estado consolidado
    debug:
      msg: "{{ inventory_hostname }} → {{ final_status }}"
