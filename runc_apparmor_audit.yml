---
- name: Auditoría AppArmor runc (VERSIÓN CORRECTA)
  hosts: all
  become: yes

  vars:
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  ##################################################
  # 1. DETECTAR RUNC
  ##################################################

  - name: Verificar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  - name: Set runc flag
    set_fact:
      runc_present: "{{ runc_check.rc == 0 }}"

  ##################################################
  # 2. VALIDAR PROFILE
  ##################################################

  - name: Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  ##################################################
  # 3. OBTENER LISTA ENFORCE REAL
  ##################################################

  - name: Obtener perfiles en enforce
    command: aa-status --json
    register: aa_json
    failed_when: false
    changed_when: false
    when: runc_present

  - name: Parsear enforce real
    set_fact:
      enforce_active: "{{ 'usr.bin.runc' in (aa_json.stdout | default('')) }}"
    when: runc_present

  ##################################################
  # 4. DETECTAR CONFLICTOS
  ##################################################

  - name: Verificar backups activos
    shell: ls /etc/apparmor.d/usr.bin.runc.bak_* 2>/dev/null | wc -l
    register: backup_count
    changed_when: false
    failed_when: false

  ##################################################
  # 5. RESULTADO FINAL
  ##################################################

  - name: Reporte final
    debug:
      msg: |
        ===== HOST: {{ inventory_hostname }} =====
        runc instalado: {{ runc_present }}
        profile existe: {{ profile_stat.stat.exists }}
        enforce activo: {{ 'SI ✅' if enforce_active else 'NO ⚠️' }}
        backups: {{ backup_count.stdout }}

  ##################################################
  # 6. ESTADO GLOBAL
  ##################################################

  - name: Estado consolidado
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'OK ✅' if (runc_present and profile_stat.stat.exists and enforce_active) else 'REVISAR ⚠️' }}
