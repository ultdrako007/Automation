---
- name: Auditoría AppArmor runc (estado completo)
  hosts: all
  become: yes

  vars:
    profile: /etc/apparmor.d/usr.bin.runc

  tasks:

  ##########################################
  # 1. DETECTAR RUNC
  ##########################################

  - name: Verificar runc
    command: which runc
    register: runc_check
    failed_when: false
    changed_when: false

  - name: Determinar aplicabilidad
    set_fact:
      runc_present: "{{ runc_check.rc == 0 }}"

  ##########################################
  # 2. VALIDAR PROFILE
  ##########################################

  - name: Verificar profile
    stat:
      path: "{{ profile }}"
    register: profile_stat

  ##########################################
  # 3. VALIDAR ESTADO APPARMOR
  ##########################################

  - name: Obtener estado AppArmor
    command: aa-status
    register: aa_status
    changed_when: false
    failed_when: false
    when: runc_present

  ##########################################
  # 4. VALIDAR ENFORCE
  ##########################################

  - name: Verificar modo enforce
    shell: aa-status | grep usr.bin.runc
    register: runc_status
    failed_when: false
    changed_when: false
    when: runc_present

  ##########################################
  # 5. DETECTAR CONFLICTOS
  ##########################################

  - name: Detectar backups conflictivos
    shell: ls /etc/apparmor.d/usr.bin.runc.bak_* 2>/dev/null | wc -l
    register: backup_count
    changed_when: false
    failed_when: false

  ##########################################
  # 6. RESULTADO FINAL
  ##########################################

  - name: Reporte final
    debug:
      msg: |
        ===== HOST: {{ inventory_hostname }} =====
        runc instalado: {{ runc_present }}
        profile existe: {{ profile_stat.stat.exists }}
        enforce activo: {{ 'ENFORCE ✅' if ('enforce' in (runc_status.stdout | default(''))) else 'NO ⚠️' }}
        backups encontrados: {{ backup_count.stdout }}

  ##########################################
  # 7. RESUMEN GLOBAL
  ##########################################

  - name: Verificación rápida
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'OK ✅' if (runc_present and profile_stat.stat.exists and 'enforce' in (runc_status.stdout | default(''))) else 'REVISAR ⚠️' }}
