---
- name: Optimize inteligente AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning

  tasks:

  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  - name: 🧠 Default
    set_fact:
      state:
        active: false
    when: not state_stat.stat.exists

  - name: 📊 Estado Optimize
    debug:
      msg: "{{ inventory_hostname }} → {{ 'OPTIMIZAR ✅' if state.active else 'OMITIDO 🚫' }}"

  - name: ⚙️ Optimizar reglas
    shell: |
      cat {{ working_dir }}/runc_paths.txt | \
      sed 's|/usr/lib/.*|/usr/lib/**|' | \
      sed 's|/lib/.*|/lib/**|' | \
      sed 's|/opt/containerd/.*|/opt/containerd/**|' | \
      sed 's|/run/containerd/.*|/run/containerd/**|' | \
      sort | uniq > {{ working_dir }}/rules_optimized.txt
    when: state.active
