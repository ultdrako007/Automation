---
- name: Optimize inteligente AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning

  tasks:

  - name: 🔍 Validar paths
    stat:
      path: "{{ working_dir }}/runc_paths.txt"
    register: paths_file

  - name: 🧠 Determinar optimización
    set_fact:
      apparmor_active: "{{ paths_file.stat.exists and paths_file.stat.size > 0 }}"

  - name: 📊 Estado
    debug:
      msg: "{{ inventory_hostname }} → {{ 'OPTIMIZAR ✅' if apparmor_active else 'OMITIDO 🚫' }}"

  - name: ⚙️ Optimizar reglas
    shell: |
      cat {{ working_dir }}/runc_paths.txt | \
      sed 's|/usr/lib/.*|/usr/lib/**|' | \
      sed 's|/lib/.*|/lib/**|' | \
      sed 's|/opt/containerd/.*|/opt/containerd/**|' | \
      sed 's|/run/containerd/.*|/run/containerd/**|' | \
      sort | uniq > {{ working_dir }}/rules_optimized.txt
    when: apparmor_active
