- name: Desplegar Agente Checkmk 2.5 via Descarga Directa y Auto-Alta
  hosts: Linux
  become: yes
  vars:
    ansible_python_interpreter: auto_silent
    
    # URL para la API y descargas (Pasa por tu Reverse Proxy)
    cmk_url_base: "https://checkmate.drakoscave.duckdns.org/cmk"
    cmk_download_url: "{{ cmk_url_base }}/check_mk/agents/check-mk-agent_2.5.0p4-1_all.deb"
    
    # Conexión directa por LAN para el registro TLS del agente
    cmk_server_internal: "192.168.13.244:8000"
    cmk_site: "cmk"
    cmk_automation_secret: "6c3KmS(wIn#U&%Oc" 

  tasks:
    - name: 1. Recolectar datos y paquetes del sistema
      ansible.builtin.package_facts:
        manager: auto

    - name: 2. Crear el host en Checkmk via REST API (En la carpeta Drakos Lx)
      ansible.builtin.uri:
        url: "{{ cmk_url_base }}/check_mk/api/1.0/domain-types/host_config/collections/all"
        method: POST
        headers:
          Authorization: "Bearer automation {{ cmk_automation_secret }}"
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          host_name: "{{ ansible_hostname }}"
          folder: "/drakos_lx"
          attributes:
            ipaddress: "{{ ansible_default_ipv4.address }}"
        status_code: [200, 201, 400]
        validate_certs: yes
      register: cmk_host_api

    - name: 3a. Obtener el ETag de los cambios pendientes (Requerido por seguridad)
      ansible.builtin.uri:
        url: "{{ cmk_url_base }}/check_mk/api/1.0/domain-types/activation_run/collections/pending_changes"
        method: GET
        headers:
          Authorization: "Bearer automation {{ cmk_automation_secret }}"
          Accept: "application/json"
        status_code: [200]
        validate_certs: yes
      register: cmk_pending_changes
      run_once: true

    - name: 3b. Activar cambios pendientes en Checkmk (Endpoint e ETag correctos)
      ansible.builtin.uri:
        url: "{{ cmk_url_base }}/check_mk/api/1.0/domain-types/activation_run/actions/activate-changes/invoke"
        method: POST
        headers:
          Authorization: "Bearer automation {{ cmk_automation_secret }}"
          Content-Type: "application/json"
          Accept: "application/json"
          If-Match: "{{ cmk_pending_changes.etag }}"
        body_format: json
        body:
          redirect: false
          sites:
            - "{{ cmk_site }}"
          force_foreign_changes: true  # Fuerza la activación aunque existan cambios de otros lados
        status_code: [200, 201, 204]
        validate_certs: yes
      run_once: true

    - name: 4. Descargar el agente desde Checkmate (Solo si NO está instalado)
      get_url:
        url: "{{ cmk_download_url }}"
        dest: /tmp/check-mk-agent.deb
        validate_certs: yes
        timeout: 30
      when: "'check-mk-agent' not in ansible_facts.packages"

    - name: 5. Instalar el paquete .deb del agente (Solo si NO está instalado)
      apt:
        deb: /tmp/check-mk-agent.deb
        state: present
      when: "'check-mk-agent' not in ansible_facts.packages"

    - name: 6. Remover el archivo temporal .deb (Solo si se descargó)
      file:
        path: /tmp/check-mk-agent.deb
        state: absent
      when: "'check-mk-agent' not in ansible_facts.packages"

    - name: 7. Verificar si el agente ya está registrado en TLS
      command: cmk-agent-ctl status
      register: agent_status
      changed_when: false
      failed_when: false

    - name: 8. Registrar el nodo en Checkmk (Directo a la IP interna puerto 8000)
      command: >
        cmk-agent-ctl register
        --hostname "{{ ansible_hostname }}"
        --server "{{ cmk_server_internal }}"
        --site "{{ cmk_site }}"
        --user automation
        --password "{{ cmk_automation_secret }}"
        --trust-cert
      when: "'Connections: 0' in agent_status.stdout or 'No connections' in agent_status.stdout"
