---
- name: Analyze inteligente AppArmor basado en logs reales
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    working_dir: /tmp/apparmor_tuning

  tasks:

  - name: 🔍 Verificar si existe log recolectado
    stat:
      path: "{{ working_dir }}/runc_raw.log"
    register: log_file

  - name: 🧠 Determinar si el host tiene datos para analizar
    set_fact:
      analyze_applicable: "{{ log_file.stat.exists and log_file.stat.size > 0 }}"

  - name: 📊 Estado Analyze
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'ANALIZAR ✅' if analyze_applicable else 'SIN DATOS 🚫' }}

  - name: 🔍 Extraer paths únicos
    shell: |
      cat {{ working_dir }}/runc_raw.log | \
      grep 'name=' | \
      awk -F 'name=' '{print $2}' | \
      awk '{print $1}' | tr -d '"' | \
      sort | uniq > {{ working_dir }}/runc_paths.txt
    args:
      executable: /bin/bash
    when: analyze_applicable

  - name: 🚫 Host sin datos
    debug:
      msg: "Sin eventos AppArmor, se omite análisis"
    when: not analyze_applicable
``
