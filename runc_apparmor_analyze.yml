---
- name: Analyze inteligente AppArmor (basado en estado real)
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning

  tasks:

  - name: 🔍 Leer estado del host
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    ignore_errors: yes

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_file is defined and state_file.content is defined
    failed_when: false

  - name: 📊 Estado Analyze
    debug:
      msg: >
        {{ inventory_hostname }} →
        {{ 'ANALIZAR ✅' if (state.active | default(false)) else 'OMITIDO 🚫' }}

  - name: 🔍 Extraer paths
    shell: |
      cat {{ working_dir }}/runc_raw.log | \
      grep 'name=' | \
      awk -F 'name=' '{print $2}' | \
      awk '{print $1}' | tr -d '"' | \
      sort | uniq > {{ working_dir }}/runc_paths.txt
    when: state.active | default(false)
