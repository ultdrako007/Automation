---
- name: Analyze inteligente AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning

  tasks:

  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  - name: 🧠 Estado por defecto
    set_fact:
      state:
        active: false
    when: not state_stat.stat.exists

  - name: 📊 Estado Analyze
    debug:
      msg: "{{ inventory_hostname }} → {{ 'ANALIZAR ✅' if state.active else 'OMITIDO 🚫' }}"

  - name: 🔍 Extraer paths
    shell: |
      cat {{ working_dir }}/runc_raw.log | \
      grep 'name=' | \
      awk -F 'name=' '{print $2}' | \
      awk '{print $1}' | tr -d '"' | \
      sort | uniq > {{ working_dir }}/runc_paths.txt
    when: state.active
