---
- name: Generar reporte consolidado AppArmor
  hosts: all
  become: yes

  vars:
    working_dir: /tmp/apparmor_tuning
    report_file: /tmp/apparmor_report.csv

  tasks:

  - name: 🔍 Verificar state.json
    stat:
      path: "{{ working_dir }}/state.json"
    register: state_stat

  - name: 📥 Leer estado
    slurp:
      src: "{{ working_dir }}/state.json"
    register: state_file
    when: state_stat.stat.exists

  - name: 🧠 Parsear estado
    set_fact:
      state: "{{ state_file.content | b64decode | from_json }}"
    when: state_stat.stat.exists

  - name: 🧠 Default estado
    set_fact:
      state:
        candidate: false
        active: false
    when: not state_stat.stat.exists

  - name: 🔍 Verificar reglas
    stat:
      path: "{{ working_dir }}/rules_optimized.txt"
    register: rules_file
    ignore_errors: yes

  - name: 🔍 Contar paths
    shell: wc -l {{ working_dir }}/runc_paths.txt | awk '{print $1}'
    register: path_count
    failed_when: false
    changed_when: false

  - name: 📊 Generar línea CSV
    lineinfile:
      path: "{{ report_file }}"
      line: "{{ inventory_hostname }},{{ state.candidate }},{{ state.active }},{{ rules_file.stat.exists | default(false) }},{{ path_count.stdout | default('0') }}"
      create: yes

  - name: 📥 Descargar reporte
    fetch:
      src: "{{ report_file }}"
      dest: "./apparmor_reports/"
      flat: yes
