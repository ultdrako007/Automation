---
- name: Debug become
  hosts: all
  gather_facts: false

  tasks:
    - name: Usuario sin become
      command: id
      become: false
      register: no_become

    - name: Usuario con become
      command: id
      become: true
      register: with_become
      failed_when: false

    - name: sudo -n directo
      command: sudo -n whoami
      become: false
      register: sudo_test
      failed_when: false

    - name: Resultados
      debug:
        msg:
          - "Sin become : {{ no_become.stdout }}"
          - "Con become : {{ with_become.stdout | default('FALLÓ') }}"
          - "sudo -n    : {{ sudo_test.stdout | default('') }} {{ sudo_test.stderr | default('') }}"
