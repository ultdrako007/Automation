---
- name: Sincronizar Hora, Zona Horaria e Instalar Cliente NTP
  hosts: all
  become: true
  become_method: sudo
  serial: 3

  tasks:

    # FASE 1: PRE-CHECKS
    - name: Verificar sistema Debian/Ubuntu
      fail:
        msg: "Este playbook solo funciona en sistemas basados en Debian"
      when: ansible_os_family != "Debian"

    - name: 1. Matar procesos que bloquean APT
      shell: |
        pkill -9 apt || true
        pkill -9 apt-get || true
        pkill -9 dpkg || true
        pkill -9 unattended-upgrade || true
      changed_when: false
      failed_when: false

    - name: 2. Eliminar locks de APT si existen
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/dpkg/lock
        - /var/lib/dpkg/lock-frontend
        - /var/lib/apt/lists/lock
        - /var/cache/apt/archives/lock
      failed_when: false

    # FASE 2: ZONA HORARIA Y NTP
    - name: 3. Establecer zona horaria America/Mexico_City
      ansible.builtin.command: timedatectl set-timezone America/Mexico_City
      changed_when: false

    - name: 4. Instalar chrony
      ansible.builtin.package:
        name: chrony
        state: present

    - name: 5. Habilitar e iniciar chrony
      ansible.builtin.service:
        name: chrony          # <-- corregido de chronyd
        state: started
        enabled: yes
      register: ntp_status

    # FASE 3: REPORTE
    - name: Reporte final
      debug:
        msg:
          - "================================"
          - "Host: {{ inventory_hostname }}"
          - "Zona Horaria: America/Mexico_City"
          - "chrony: {{ 'Iniciado (cambio aplicado)' if ntp_status.changed else 'Ya estaba configurado ✓' }}"
          - "================================"
