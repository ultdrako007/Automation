---
# ====================================================================
# Drakos Cave SOC - SSH PostQuantum Hardening v3
# Repo: https://github.com/ultdrako007/Automation
# Adapta KexAlgorithms según versión de OpenSSH:
#   - OpenSSH 10.0+ → mlkem768x25519-sha256 (NIST ML-KEM) prioritario
#   - OpenSSH 9.0-9.9 → sntrup761x25519-sha512 (PQ legacy) prioritario
# Versión: 3 (2026-06-22) - Soporte mixed Debian 13 / Ubuntu 24.04
# ====================================================================
- name: SSH PostQuantum Hardening - Drakos SOC v3
  hosts: all
  become: yes
  gather_facts: yes
  serial: 5

  vars:
    sshd_dropin_path: /etc/ssh/sshd_config.d/99-drakos-postquantum.conf

  tasks:
    - name: "[1/8] Verificar versión OpenSSH"
      ansible.builtin.command: ssh -V
      register: ssh_version
      changed_when: false

    - name: "[2/8] Validar que soporta PostQuantum (OpenSSH 9.0+)"
      ansible.builtin.assert:
        that:
          - "'OpenSSH_9' in ssh_version.stderr or 'OpenSSH_10' in ssh_version.stderr or 'OpenSSH_11' in ssh_version.stderr"
        fail_msg: "OpenSSH muy antiguo en {{ inventory_hostname }}: {{ ssh_version.stderr }}"
        success_msg: "OpenSSH compatible: {{ ssh_version.stderr }}"

    - name: "[3/8] Listar algoritmos KEX disponibles"
      ansible.builtin.command: ssh -Q kex
      register: kex_list
      changed_when: false

    - name: "[4/8] Detectar mejor algoritmo PostQuantum disponible"
      ansible.builtin.set_fact:
        has_mlkem: "{{ 'mlkem768x25519-sha256' in kex_list.stdout }}"
        has_sntrup: "{{ 'sntrup761x25519-sha512' in kex_list.stdout }}"

    - name: "[5/8] Construir KexAlgorithms según disponibilidad"
      ansible.builtin.set_fact:
        kex_algorithms: >-
          {%- set algos = [] -%}
          {%- if has_mlkem -%}{%- set _ = algos.append('mlkem768x25519-sha256') -%}{%- endif -%}
          {%- if has_sntrup -%}{%- set _ = algos.append('sntrup761x25519-sha512@openssh.com') -%}{%- endif -%}
          {%- set _ = algos.append('curve25519-sha256') -%}
          {%- set _ = algos.append('curve25519-sha256@libssh.org') -%}
          {%- set _ = algos.append('diffie-hellman-group16-sha512') -%}
          {%- set _ = algos.append('diffie-hellman-group18-sha512') -%}
          {{ algos | join(',') }}

    - name: "[6/8] Backup de sshd_config (idempotente)"
      ansible.builtin.copy:
        src: /etc/ssh/sshd_config
        dest: "/etc/ssh/sshd_config.bak_{{ ansible_date_time.date }}_drakos"
        remote_src: yes
        force: no
        owner: root
        group: root
        mode: '0600'

    - name: "[7/8] Aplicar drop-in PostQuantum"
      ansible.builtin.copy:
        dest: "{{ sshd_dropin_path }}"
        content: |
          # ====================================================================
          # Drakos Cave SOC - Post-Quantum KEX hardening
          # Aplicado: {{ ansible_date_time.date }} via Semaphore
          # OpenSSH detectado: {{ ssh_version.stderr }}
          # mlkem768 disponible: {{ has_mlkem }}
          # sntrup761 disponible: {{ has_sntrup }}
          # Justificación: mitigación "harvest now, decrypt later"
          # ====================================================================
          KexAlgorithms {{ kex_algorithms }}
        owner: root
        group: root
        mode: '0644'
        validate: '/usr/sbin/sshd -t -f %s'
      register: sshd_dropin

    - name: "[8/8] Reload SSH service (solo si cambió)"
      ansible.builtin.systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: reloaded
      when: sshd_dropin.changed

    - name: "Validar KexAlgorithms efectivos post-aplicación"
      ansible.builtin.shell: sshd -T 2>/dev/null | grep -i '^kexalgorithms'
      register: kex_check
      changed_when: false

    - name: "Reporte final por host"
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════"
          - "Host: {{ inventory_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "OpenSSH: {{ ssh_version.stderr }}"
          - "Algoritmo PQ usado: {{ 'mlkem768 (NIST)' if has_mlkem else ('sntrup761 (legacy)' if has_sntrup else 'NINGUNO') }}"
          - "Drop-in: {{ sshd_dropin_path }} ({{ 'APLICADO' if sshd_dropin.changed else 'sin cambios' }})"
          - "KEX: {{ kex_check.stdout }}"
          - "════════════════════════════════════════"
