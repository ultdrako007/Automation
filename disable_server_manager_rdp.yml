---
# ============================================================
# 🐉 Drakos SOC — Disable Server Manager auto-start on RDP login
# ============================================================
# Operador: Enrique Flores Pichardo
# Manager:  Alejandro Gongora
# Fecha:    2026-06-24
# Versión:  1.1.0
# Changelog:
#   1.0.0 - Initial release (con win_shell)
#   1.0.1 - Fix YAML backslash escape en win_regedit path
#   1.1.0 - REFACTOR: eliminados todos los win_shell blocks.
#           Causa: Ansible pre-procesa los win_shell con paths
#           PowerShell tipo '\Microsoft\Windows\Server Manager\'
#           y falla con "unbalanced jinja2 block or quotes".
#           Nueva estrategia: solo modulos puros idempotentes.
#
# Hosts objetivo (10):
#   DrakosTrooper, nicorobin, drakoshv, Veeam (DrakosBK), Vesta,
#   DrakosDHCP, DPS, Backups2, Nami, BoaHancock
#
# Estrategia (defense-in-depth - 3 layers, todas modulos puros):
#   Layer 1: community.windows.win_scheduled_task -> disable task
#            (machine-wide, todos los users existentes y futuros)
#   Layer 2: ansible.windows.win_regedit en HKLM
#            (system policy override, gana sobre HKCU)
#   Layer 3: ansible.windows.win_regedit en HKU:\.DEFAULT
#            (perfiles de usuarios FUTUROS heredan esto)
#
# ============================================================
# README - Semaphore Configuration
# ============================================================
#
# CLI Arguments (4 chips SEPARADOS, no JSON array):
#   [-e] [ansible_become_pass=] [-e] [ansible_become_flags=-n]
#
# Tags utiles:
#   --tags layer1   -> solo scheduled task
#   --tags layer2   -> solo HKLM registry
#   --tags layer3   -> solo HKU\.DEFAULT
#   --tags verify   -> solo verificacion
#   --check         -> dry run
#
# Rollback:
#   schtasks /Change /TN "\Microsoft\Windows\Server Manager\ServerManager" /ENABLE
#   reg delete "HKLM\SOFTWARE\Microsoft\ServerManager" /v DoNotOpenServerManagerAtLogon /f
#
# ============================================================

- name: Disable Server Manager auto-start on RDP login
  hosts: windows
  gather_facts: yes
  any_errors_fatal: false
  serial: "100%"

  vars:
    sm_task_path: '\Microsoft\Windows\Server Manager\'
    sm_task_name: 'ServerManager'
    sm_reg_hklm: 'HKLM:\SOFTWARE\Microsoft\ServerManager'
    sm_reg_default: 'HKU:\.DEFAULT\Software\Microsoft\ServerManager'
    sm_reg_value: 'DoNotOpenServerManagerAtLogon'

  tasks:

    # =========================================================
    # LAYER 1 - Scheduled Task (machine-wide)
    # =========================================================
    - name: Layer 1 - Deshabilitar scheduled task ServerManager
      community.windows.win_scheduled_task:
        name: "{{ sm_task_name }}"
        path: "{{ sm_task_path }}"
        enabled: no
        state: present
      tags:
        - layer1
        - serverManager

    # =========================================================
    # LAYER 2 - HKLM registry (system-wide policy)
    # =========================================================
    - name: Layer 2 - HKLM DoNotOpenServerManagerAtLogon=1
      ansible.windows.win_regedit:
        path: "{{ sm_reg_hklm }}"
        name: "{{ sm_reg_value }}"
        data: 1
        type: dword
        state: present
      tags:
        - layer2
        - rdp

    # =========================================================
    # LAYER 3 - HKU\.DEFAULT (futuros usuarios heredan esto)
    # =========================================================
    - name: Layer 3 - HKU .DEFAULT DoNotOpenServerManagerAtLogon=1
      ansible.windows.win_regedit:
        path: "{{ sm_reg_default }}"
        name: "{{ sm_reg_value }}"
        data: 1
        type: dword
        state: present
      tags:
        - layer3
        - rdp

    # =========================================================
    # Verification
    # =========================================================
    - name: Verificar Layer 1 - scheduled task disabled
      ansible.windows.win_command: schtasks /Query /TN "\Microsoft\Windows\Server Manager\ServerManager" /FO LIST
      register: verify_task
      changed_when: false
      failed_when: false
      tags:
        - verify
        - always

    - name: Verificar Layer 2 - HKLM registry
      ansible.windows.win_reg_stat:
        path: "{{ sm_reg_hklm }}"
        name: "{{ sm_reg_value }}"
      register: verify_hklm
      tags:
        - verify
        - always

    - name: Verificar Layer 3 - HKU .DEFAULT registry
      ansible.windows.win_reg_stat:
        path: "{{ sm_reg_default }}"
        name: "{{ sm_reg_value }}"
      register: verify_default
      tags:
        - verify
        - always

    # =========================================================
    # Summary
    # =========================================================
    - name: Resumen del cambio
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "Drakos SOC - Server Manager RDP Disable"
