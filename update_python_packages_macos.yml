---
# ══════════════════════════════════════════════════════════════════
# 🏰 Drakos Cave - Actualización de paquetes Python vulnerables
# Remediación de CVEs detectados por Wazuh en macOS Tahoe M2
# Detecta automáticamente pip via Homebrew o instalación directa
# ══════════════════════════════════════════════════════════════════
# CVE-2024-6345  | setuptools < 78.1.1 | CVSS 8.8 | RCE
# CVE-2025-47273 | setuptools < 78.1.1 | CVSS 8.8 | Path Traversal
# CVE-2022-40897 | setuptools < 65.5.1 | CVSS 7.5 | ReDoS
# CVE-2022-40898 | wheel < 0.38.1      | CVSS 7.5 | DoS
# CVE-2022-40899 | future < 0.18.3     | CVSS 7.5 | DoS
# CVE-2026-8643  | pip < 26.1.2        | CVSS 5.5 | Entry points (pendiente Homebrew)
# CVE-2023-5752  | pip < 23.3          | CVSS 3.3 | Cmd injection
# ══════════════════════════════════════════════════════════════════

- name: "🛡️ Actualización de paquetes Python vulnerables - macOS Tahoe"
  hosts: macos_targets
  become: true
  gather_facts: false

  vars:
    min_versions:
      pip: "26.1.1"
      setuptools: "78.1.1"
      wheel: "0.38.1"
      future: "0.18.3"
    brew_path: /opt/homebrew/bin/brew
    pip_cmd: /opt/homebrew/bin/python3 -m pip
    python_path: /opt/homebrew/bin/python3

  tasks:

    # ══════════════════════════════════════════════════════════════
    # FASE 0: Detección del entorno Python/pip
    # ══════════════════════════════════════════════════════════════

    - name: "🔍 DETECT | Verificar si Homebrew está instalado"
      ansible.builtin.stat:
        path: "{{ brew_path }}"
      register: homebrew_check
      tags: [detect, update]

    - name: "🔍 DETECT | Verificar python3 -m pip funciona"
      ansible.builtin.command:
        cmd: "{{ python_path }} -m pip --version"
      register: python_m_pip
      changed_when: false
      failed_when: false
      tags: [detect, update]

    - name: "🔍 DETECT | Verificar si pip es gestionado por Homebrew"
      ansible.builtin.shell:
        cmd: "{{ brew_path }} list python3 2>/dev/null && echo 'BREW_MANAGED' || echo 'NOT_BREW'"
      register: brew_manages_python
      changed_when: false
      failed_when: false
      become: false
      tags: [detect, update]

    - name: "🔍 DETECT | Verificar si setuptools está instalado"
      ansible.builtin.shell:
        cmd: "{{ python_path }} -c 'import setuptools; print(setuptools.__version__)' 2>/dev/null || echo 'NOT_INSTALLED'"
      register: setuptools_check
      changed_when: false
      failed_when: false
      tags: [detect, update]

    - name: "🔍 DETECT | Mostrar método detectado"
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════
          Host: {{ inventory_hostname }}
          Homebrew: {{ 'Sí' if homebrew_check.stat.exists else 'No' }}
          Python gestionado por Brew: {{ 'Sí' if 'BREW_MANAGED' in brew_manages_python.stdout else 'No' }}
          pip: {{ python_m_pip.stdout | default('No encontrado') }}
          setuptools: {{ 'No instalado' if 'NOT_INSTALLED' in setuptools_check.stdout else setuptools_check.stdout | trim }}
          ═══════════════════════════════════════════════
      tags: [detect, update]

    # ══════════════════════════════════════════════════════════════
    # FASE 1: Auditoría - Versiones actuales (ANTES)
    # ══════════════════════════════════════════════════════════════

    - name: "📋 BEFORE | Obtener versión actual de pip"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show pip 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: pip_before
      changed_when: false
      failed_when: false
      tags: [audit, update]

    - name: "📋 BEFORE | Obtener versión actual de setuptools"
      ansible.builtin.shell:
        cmd: "{{ python_path }} -c 'import setuptools; print(setuptools.__version__)' 2>/dev/null || echo 'NOT_INSTALLED'"
      register: setuptools_before
      changed_when: false
      failed_when: false
      tags: [audit, update]

    - name: "📋 BEFORE | Obtener versión actual de wheel"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show wheel 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: wheel_before
      changed_when: false
      failed_when: false
      tags: [audit, update]

    - name: "📋 BEFORE | Obtener versión actual de future"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show future 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: future_before
      changed_when: false
      failed_when: false
      tags: [audit, update]

    # ══════════════════════════════════════════════════════════════
    # FASE 2A: Actualización via Homebrew (pip, setuptools, wheel)
    # ══════════════════════════════════════════════════════════════

    - name: "🍺 UPDATE | Actualizar Python3 via Homebrew (incluye pip, wheel)"
      ansible.builtin.command:
        cmd: "{{ brew_path }} upgrade python3"
      register: brew_python_upgrade
      changed_when: "'Upgrading' in brew_python_upgrade.stdout or 'upgraded' in brew_python_upgrade.stderr"
      failed_when: false
      become: false
      when: "'BREW_MANAGED' in brew_manages_python.stdout"
      tags: [update]

    - name: "🍺 UPDATE | Actualizar python-setuptools via Homebrew (si está instalado)"
      ansible.builtin.command:
        cmd: "{{ brew_path }} upgrade python-setuptools"
      register: brew_setuptools_upgrade
      changed_when: "'Upgrading' in brew_setuptools_upgrade.stdout or 'upgraded' in brew_setuptools_upgrade.stderr"
      failed_when: false
      become: false
      when:
        - "'BREW_MANAGED' in brew_manages_python.stdout"
        - "'NOT_INSTALLED' not in setuptools_check.stdout"
      tags: [update]

    # ══════════════════════════════════════════════════════════════
    # FASE 2B: Actualización via pip (future + fallback)
    # ══════════════════════════════════════════════════════════════

    - name: "⬆️ UPDATE | Actualizar future via pip (no es paquete de Homebrew)"
      ansible.builtin.command:
        cmd: "{{ pip_cmd }} install --upgrade --break-system-packages future"
      register: future_upgrade
      changed_when: "'Successfully installed' in future_upgrade.stdout"
      tags: [update]

    - name: "⬆️ FALLBACK | Actualizar pip via pip (si no es Homebrew)"
      ansible.builtin.command:
        cmd: "{{ pip_cmd }} install --upgrade --break-system-packages pip"
      register: pip_upgrade_fallback
      changed_when: "'Successfully installed' in pip_upgrade_fallback.stdout"
      when: "'BREW_MANAGED' not in brew_manages_python.stdout"
      tags: [update]

    - name: "⬆️ FALLBACK | Actualizar setuptools via pip (si no es Homebrew)"
      ansible.builtin.command:
        cmd: "{{ pip_cmd }} install --upgrade --break-system-packages setuptools"
      register: setuptools_upgrade_fallback
      changed_when: "'Successfully installed' in setuptools_upgrade_fallback.stdout"
      when:
        - "'BREW_MANAGED' not in brew_manages_python.stdout"
        - "'NOT_INSTALLED' not in setuptools_check.stdout"
      tags: [update]

    - name: "⬆️ FALLBACK | Actualizar wheel via pip (si no es Homebrew)"
      ansible.builtin.command:
        cmd: "{{ pip_cmd }} install --upgrade --break-system-packages wheel"
      register: wheel_upgrade_fallback
      changed_when: "'Successfully installed' in wheel_upgrade_fallback.stdout"
      when: "'BREW_MANAGED' not in brew_manages_python.stdout"
      tags: [update]

    # ══════════════════════════════════════════════════════════════
    # FASE 3: Verificación - Versiones nuevas (DESPUÉS)
    # ══════════════════════════════════════════════════════════════

    - name: "🔍 AFTER | Obtener versión nueva de pip"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show pip 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: pip_after
      changed_when: false
      failed_when: false
      tags: [verify, update]

    - name: "🔍 AFTER | Obtener versión nueva de setuptools"
      ansible.builtin.shell:
        cmd: "{{ python_path }} -c 'import setuptools; print(setuptools.__version__)' 2>/dev/null || echo 'NOT_INSTALLED'"
      register: setuptools_after
      changed_when: false
      failed_when: false
      tags: [verify, update]

    - name: "🔍 AFTER | Obtener versión nueva de wheel"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show wheel 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: wheel_after
      changed_when: false
      failed_when: false
      tags: [verify, update]

    - name: "🔍 AFTER | Obtener versión nueva de future"
      ansible.builtin.shell:
        cmd: "{{ pip_cmd }} show future 2>/dev/null | grep '^Version:' | awk '{print $2}'"
      register: future_after
      changed_when: false
      failed_when: false
      tags: [verify, update]

    # ══════════════════════════════════════════════════════════════
    # FASE 4: Validación de versiones mínimas contra CVEs
    # ══════════════════════════════════════════════════════════════

    - name: "🔒 VALIDATE | Comparar versiones contra mínimos requeridos"
      ansible.builtin.set_fact:
        pip_ok: "{{ (pip_after.stdout | trim | default('0.0.0', true)) is version(min_versions.pip, '>=') }}"
        setuptools_installed: "{{ 'NOT_INSTALLED' not in setuptools_after.stdout }}"
        setuptools_ok: "{{ (setuptools_after.stdout | trim) is version(min_versions.setuptools, '>=') if 'NOT_INSTALLED' not in setuptools_after.stdout else true }}"
        wheel_ok: "{{ (wheel_after.stdout | trim | default('0.0.0', true)) is version(min_versions.wheel, '>=') }}"
        future_ok: "{{ (future_after.stdout | trim | default('0.0.0', true)) is version(min_versions.future, '>=') }}"
      tags: [verify, update]

    # ══════════════════════════════════════════════════════════════
    # FASE 5: Pip audit
    # ══════════════════════════════════════════════════════════════

    - name: "🔒 SECURITY | Ejecutar pip audit"
      ansible.builtin.command:
        cmd: "{{ pip_cmd }} audit"
      register: pip_audit
      changed_when: false
      failed_when: false
      tags: [verify, update]

    # ══════════════════════════════════════════════════════════════
    # REPORTE FINAL
    # ══════════════════════════════════════════════════════════════

    - name: "📊 REPORTE DE ACTUALIZACIÓN Y VALIDACIÓN"
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════════════════════════
          🏰 DRAKOS CAVE - Reporte de Actualización Python Packages
          ══════════════════════════════════════════════════════════════════
          Host: {{ inventory_hostname }}
          Fecha: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S"') }}
          Método: {{ 'Homebrew + pip' if 'BREW_MANAGED' in brew_manages_python.stdout else 'pip directo' }}
          ──────────────────────────────────────────────────────────────────

          📦 VERSIONES
          ─────────────────────────────────────────────────────────────────
          Paquete      │ Antes          │ Después        │ Mínimo
          ─────────────┼────────────────┼────────────────┼────────────────
          pip          │ {{ pip_before.stdout | default('N/A') | trim }}  │ {{ pip_after.stdout | default('N/A') | trim }}  │ >= {{ min_versions.pip }}
          setuptools   │ {{ setuptools_before.stdout | default('N/A') | trim }}  │ {{ setuptools_after.stdout | default('N/A') | trim }}  │ {{ '>= ' + min_versions.setuptools if setuptools_installed else 'N/A (no instalado)' }}
          wheel        │ {{ wheel_before.stdout | default('N/A') | trim }}  │ {{ wheel_after.stdout | default('N/A') | trim }}  │ >= {{ min_versions.wheel }}
          future       │ {{ future_before.stdout | default('N/A') | trim }}  │ {{ future_after.stdout | default('N/A') | trim }}  │ >= {{ min_versions.future }}

          🔒 VALIDACIÓN DE CVEs
          ─────────────────────────────────────────────────────────────────
          ✅  CVE-2023-5752  │ pip cmd injection        │ CVSS 3.3
          ⏳  CVE-2026-8643  │ pip entry points (pendiente brew) │ CVSS 5.5
          {{ '🟢 N/A' if not setuptools_installed else ('✅' if setuptools_ok else '❌') }}  CVE-2024-6345  │ setuptools RCE           │ CVSS 8.8 {{ '(no instalado - no vulnerable)' if not setuptools_installed else '' }}
          {{ '🟢 N/A' if not setuptools_installed else ('✅' if setuptools_ok else '❌') }}  CVE-2025-47273 │ setuptools path traversal│ CVSS 8.8 {{ '(no instalado - no vulnerable)' if not setuptools_installed else '' }}
          {{ '🟢 N/A' if not setuptools_installed else ('✅' if setuptools_ok else '❌') }}  CVE-2022-40897 │ setuptools ReDoS         │ CVSS 7.5 {{ '(no instalado - no vulnerable)' if not setuptools_installed else '' }}
          {{ '✅' if wheel_ok else '❌' }}  CVE-2022-40898 │ wheel DoS                │ CVSS 7.5
          {{ '✅' if future_ok else '❌' }}  CVE-2022-40899 │ future DoS               │ CVSS 7.5

          ─────────────────────────────────────────────────────────────────
          🔍 pip audit: {{ pip_audit.stdout | default('No disponible') | trim }}
          ══════════════════════════════════════════════════════════════════
      tags: [report, update]

    # ══════════════════════════════════════════════════════════════
    # ASSERT FINAL
    # ══════════════════════════════════════════════════════════════

    - name: "🚨 VERIFICACIÓN FINAL - Todas las versiones deben cumplir"
      ansible.builtin.assert:
        that:
          - pip_ok | bool
          - setuptools_ok | bool
          - wheel_ok | bool
          - future_ok | bool
        success_msg: "🏰 ¡Todos los paquetes actualizados y CVEs remediados! El Gremio de Orario aprueba. ⚔️"
        fail_msg: "⚠️ pip_ok={{ pip_ok }} setuptools_ok={{ setuptools_ok }} wheel_ok={{ wheel_ok }} future_ok={{ future_ok }}"
      tags: [assert, update]
