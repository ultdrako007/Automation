---
# =============================================================
# 🐉 DRAKOS CAVE SOC — CIS Hardening Playbook v7d
# =============================================================
# Target OS:  Debian 13 / Ubuntu 24.04
# Inventory:  linux_servers (12 hosts)
# Author:     Enrique Flores Pichardo — SOC Drakos Cave
# Serial:     30% (gradual deployment)
# Design:     ZERO ansible.builtin.service — all shell-based
# Changes v7d:
#   - AIDE moved to separate play (never kills other hosts)
#   - max_fail_percentage: 34 on main play
#   - AIDE exclusions for heavy dirs (/var/lib/docker, /proc...)
#   - async: 2700 + poll: 0 (true fire-and-forget)
#   - Tags: aide, aide_init for selective skip
# =============================================================

# #############################################################
# PLAY 1 — CIS HARDENING (Sections 0-16, 18-19)
# #############################################################
- name: "🐉 Drakos Cave SOC — CIS Benchmark Hardening v7d"
  hosts: all
  become: true
  gather_facts: true
  serial: "30%"
  max_fail_percentage: 34

  # ===========================================================
  # HANDLERS (all shell-based — ZERO service module)
  # ===========================================================
  handlers:
    - name: Restart SSH
      shell: systemctl restart sshd || systemctl restart ssh || true

    - name: Restart auditd
      shell: systemctl restart auditd || true

    - name: Restart rsyslog
      shell: systemctl restart rsyslog || true

    - name: Reload sysctl
      shell: sysctl --system || true

    - name: Update GRUB
      shell: update-grub || true

  # ===========================================================
  # TASKS — Sections 0 through 16, 18, 19
  # ===========================================================
  tasks:

    # =========================================================
    # SECTION 0 | Reparacion global dpkg
    # =========================================================
    - name: "0 | Reparar dpkg global"
      shell: dpkg --configure -a
      changed_when: false
      ignore_errors: true

    - name: "0.1 | Actualizar cache apt"
      shell: apt-get update -y
      changed_when: false
      ignore_errors: true

    # =========================================================
    # SECTION 1 | Filesystem /dev/shm — CIS 33015-33017
    # =========================================================
    - name: "1.1 | Verificar opciones /dev/shm"
      shell: mount | grep '/dev/shm' | grep -E 'nodev|nosuid|noexec'
      register: shm_check
      ignore_errors: true
      changed_when: false

    - name: "1.2 | Configurar /dev/shm en fstab"
      lineinfile:
        path: /etc/fstab
        regexp: '\s/dev/shm\s'
        line: "tmpfs /dev/shm tmpfs defaults,nodev,nosuid,noexec 0 0"
        create: true

    - name: "1.3 | Remontar /dev/shm"
      shell: mount -o remount,nodev,nosuid,noexec /dev/shm || true
      changed_when: false

    # =========================================================
    # SECTION 2 | Kernel modules (cramfs, usb-storage)
    # =========================================================
    - name: "2.1 | Deshabilitar cramfs"
      copy:
        dest: /etc/modprobe.d/cramfs.conf
        content: |
          install cramfs /bin/true
          blacklist cramfs
        owner: root
        group: root
        mode: '0644'

    - name: "2.2 | Descargar modulo cramfs"
      shell: modprobe -r cramfs || true
      changed_when: false

    - name: "2.3 | Deshabilitar usb-storage"
      copy:
        dest: /etc/modprobe.d/usb-storage.conf
        content: |
          install usb-storage /bin/true
          blacklist usb-storage
        owner: root
        group: root
        mode: '0644'

    - name: "2.4 | Descargar modulo usb-storage"
      shell: modprobe -r usb-storage || true
      changed_when: false

    # =========================================================
    # SECTION 3 | Deshabilitar IPv6
    # =========================================================
    - name: "3.1 | Deshabilitar IPv6 — all"
      lineinfile:
        path: /etc/sysctl.d/99-cis-ipv6.conf
        regexp: '^net\.ipv6\.conf\.all\.disable_ipv6'
        line: "net.ipv6.conf.all.disable_ipv6 = 1"
        create: true

    - name: "3.2 | Deshabilitar IPv6 — default"
      lineinfile:
        path: /etc/sysctl.d/99-cis-ipv6.conf
        regexp: '^net\.ipv6\.conf\.default\.disable_ipv6'
        line: "net.ipv6.conf.default.disable_ipv6 = 1"
        create: true

    - name: "3.3 | Aplicar sysctl IPv6"
      shell: sysctl --system
      changed_when: false

    # =========================================================
    # SECTION 4 | Network sysctl + Docker-aware ip_forward
    # =========================================================
    - name: "4.0 | Detectar Docker para ip_forward"
      shell: command -v docker && docker ps >/dev/null 2>&1
      register: docker_check
      ignore_errors: true
      changed_when: false

    - name: "4.1 | ip_forward=0 (SOLO si NO hay Docker)"
      lineinfile:
        path: /etc/sysctl.d/99-cis-network.conf
        regexp: '^net\.ipv4\.ip_forward'
        line: "net.ipv4.ip_forward = 0"
        create: true
      when: docker_check.rc != 0

    - name: "4.2 | Parametros sysctl CIS de red"
      lineinfile:
        path: /etc/sysctl.d/99-cis-network.conf
        regexp: "^{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        create: true
      loop:
        - { key: "net.ipv4.conf.all.send_redirects", value: "0" }
        - { key: "net.ipv4.conf.default.send_redirects", value: "0" }
        - { key: "net.ipv4.conf.all.accept_source_route", value: "0" }
        - { key: "net.ipv4.conf.default.accept_source_route", value: "0" }
        - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
        - { key: "net.ipv4.conf.default.accept_redirects", value: "0" }
        - { key: "net.ipv4.conf.all.secure_redirects", value: "0" }
        - { key: "net.ipv4.conf.default.secure_redirects", value: "0" }
        - { key: "net.ipv4.conf.all.log_martians", value: "1" }
        - { key: "net.ipv4.conf.default.log_martians", value: "1" }
        - { key: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
        - { key: "net.ipv4.icmp_ignore_bogus_error_responses", value: "1" }
        - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
        - { key: "net.ipv4.conf.default.rp_filter", value: "1" }
        - { key: "net.ipv4.tcp_syncookies", value: "1" }

    - name: "4.3 | Aplicar sysctl red"
      shell: sysctl --system
      changed_when: false

    # =========================================================
    # SECTION 5 | Bluetooth — CIS 33109
    # =========================================================
    - name: "5.1 | Detener Bluetooth"
      shell: systemctl stop bluetooth.service || true
      changed_when: false

    - name: "5.2 | Deshabilitar Bluetooth"
      shell: systemctl disable bluetooth.service || true
      changed_when: false

    - name: "5.3 | Enmascarar Bluetooth"
      shell: systemctl mask bluetooth.service || true
      changed_when: false

    # =========================================================
    # SECTION 6 | AppArmor + GRUB — CIS 33039-33040
    # =========================================================
    - name: "6.1 | Instalar AppArmor"
      shell: apt-get install -y apparmor apparmor-utils
      changed_when: false
      ignore_errors: true

    - name: "6.1.1 | dpkg repair post AppArmor"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "6.2 | Enforce AppArmor profiles"
      shell: aa-enforce /etc/apparmor.d/* || true
      changed_when: false
      ignore_errors: true

    - name: "6.3 | Configurar GRUB para AppArmor"
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="apparmor=1 security=apparmor"'
      ignore_errors: true
      notify: Update GRUB

    # =========================================================
    # SECTION 7 | Banners — CIS 33048-33053
    # =========================================================
    - name: "7.1 | Desplegar banner pre-login /etc/issue"
      copy:
        src: files/issue_banner.txt
        dest: /etc/issue
        owner: root
        group: root
        mode: '0644'
      ignore_errors: true

    - name: "7.2 | Desplegar banner pre-login /etc/issue.net"
      copy:
        src: files/issue_banner.txt
        dest: /etc/issue.net
        owner: root
        group: root
        mode: '0644'
      ignore_errors: true

    - name: "7.3 | Desplegar banner post-login /etc/motd"
      copy:
        src: files/motd_banner.txt
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
        follow: true
      ignore_errors: true

    # =========================================================
    # SECTION 8 | Servicios — CIS 33083, 33097
    # =========================================================
    - name: "8.1 | Eliminar X Window System"
      shell: apt-get purge -y xserver-xorg* || true
      changed_when: false

    - name: "8.1.1 | dpkg repair post X Window"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "8.2 | Instalar chrony"
      shell: apt-get install -y chrony
      changed_when: false
      ignore_errors: true

    - name: "8.2.1 | dpkg repair post chrony"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "8.3 | Configurar chrony pool"
      lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: '^pool '
        line: "pool 2.debian.pool.ntp.org iburst"
        create: true
      ignore_errors: true

    - name: "8.4 | Habilitar y reiniciar chrony"
      shell: systemctl enable chrony || true && systemctl restart chrony || true
      changed_when: false

    # =========================================================
    # SECTION 9 | SSH Hardening — CIS 33168
    # =========================================================
    - name: "9.1 | Parametros SSH (14 params)"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}\\s"
        line: "{{ item.key }} {{ item.value }}"
      loop:
        - { key: "Protocol", value: "2" }
        - { key: "LogLevel", value: "VERBOSE" }
        - { key: "MaxAuthTries", value: "4" }
        - { key: "IgnoreRhosts", value: "yes" }
        - { key: "HostbasedAuthentication", value: "no" }
        - { key: "PermitRootLogin", value: "no" }
        - { key: "PermitEmptyPasswords", value: "no" }
        - { key: "PermitUserEnvironment", value: "no" }
        - { key: "X11Forwarding", value: "no" }
        - { key: "LoginGraceTime", value: "60" }
        - { key: "ClientAliveInterval", value: "300" }
        - { key: "ClientAliveCountMax", value: "3" }
        - { key: "MaxStartups", value: "10:30:60" }
        - { key: "MaxSessions", value: "10" }
        - { key: "Banner", value: "/etc/issue.net" }
      notify: Restart SSH

    - name: "9.2 | SSH MACs"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MACs\s'
        line: "MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
      notify: Restart SSH

    - name: "9.3 | SSH Ciphers"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Ciphers\s'
        line: "Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
      notify: Restart SSH

    - name: "9.4 | SSH KexAlgorithms"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KexAlgorithms\s'
        line: "KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256"
      notify: Restart SSH

    - name: "9.5 | Validar configuracion SSH"
      shell: sshd -t
      register: sshd_test
      ignore_errors: true
      changed_when: false

    - name: "9.6 | Resultado validacion SSH"
      debug:
        msg: "SSH config: {{ 'VALID' if sshd_test.rc == 0 else 'ERROR — Revisar sshd_config' }}"

    # =========================================================
    # SECTION 10 | Sudo — CIS 33178, 33181, 33182
    # =========================================================
    - name: "10.1 | Sudo use_pty"
      lineinfile:
        path: /etc/sudoers
        regexp: '^Defaults\s+use_pty'
        line: "Defaults use_pty"
        validate: "visudo -cf %s"

    - name: "10.2 | Sudo logfile"
      lineinfile:
        path: /etc/sudoers
        regexp: '^Defaults\s+logfile='
        line: 'Defaults logfile="/var/log/sudo.log"'
        validate: "visudo -cf %s"

    - name: "10.3 | Permisos /etc/sudoers.d/"
      file:
        path: /etc/sudoers.d
        state: directory
        owner: root
        group: root
        mode: '0750'

    # =========================================================
    # SECTION 11 | Cron — CIS 33099-33104
    # =========================================================
    - name: "11.1 | Habilitar cron"
      shell: systemctl enable cron || true
      changed_when: false

    - name: "11.2 | Permisos crontab"
      file:
        path: /etc/crontab
        owner: root
        group: root
        mode: '0600'
      ignore_errors: true

    - name: "11.3 | Permisos directorios cron"
      file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: '0700'
        state: directory
      loop:
        - /etc/cron.hourly
        - /etc/cron.daily
        - /etc/cron.weekly
        - /etc/cron.monthly
        - /etc/cron.d
      ignore_errors: true

    - name: "11.4 | Restringir cron a root"
      shell: |
        echo "root" > /etc/cron.allow
        chmod 600 /etc/cron.allow
        chown root:root /etc/cron.allow
        [ -f /etc/cron.deny ] && rm -f /etc/cron.deny || true
      changed_when: false

    - name: "11.5 | Restringir at a root"
      shell: |
        echo "root" > /etc/at.allow
        chmod 600 /etc/at.allow
        chown root:root /etc/at.allow
        [ -f /etc/at.deny ] && rm -f /etc/at.deny || true
      changed_when: false

    # =========================================================
    # SECTION 12 | Contrasenas — CIS 33185, 33208-33212
    # =========================================================
    - name: "12.1 | login.defs — PASS_MAX_DAYS"
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: "PASS_MAX_DAYS 365"
        create: true

    - name: "12.2 | login.defs — PASS_MIN_DAYS"
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS'
        line: "PASS_MIN_DAYS 7"
        create: true

    - name: "12.3 | login.defs — PASS_WARN_AGE"
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_WARN_AGE'
        line: "PASS_WARN_AGE 7"
        create: true

    - name: "12.4 | login.defs — PASS_MIN_LEN"
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_LEN'
        line: "PASS_MIN_LEN 14"
        create: true

    - name: "12.5 | INACTIVE 30 dias"
      shell: useradd -D -f 30
      changed_when: false
      ignore_errors: true

    - name: "12.6 | Instalar libpam-pwquality"
      shell: apt-get install -y libpam-pwquality
      changed_when: false
      ignore_errors: true

    - name: "12.6.1 | dpkg repair post pwquality"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "12.7 | Configurar pwquality"
      lineinfile:
        path: /etc/security/pwquality.conf
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        create: true
      loop:
        - { key: "minlen", value: "14" }
        - { key: "dcredit", value: "-1" }
        - { key: "ucredit", value: "-1" }
        - { key: "ocredit", value: "-1" }
        - { key: "lcredit", value: "-1" }

    # =========================================================
    # SECTION 13 | PAM nullok — CIS 33204
    # =========================================================
    - name: "13.1 | Remover nullok de common-auth"
      shell: sed -i 's/\s*nullok//g' /etc/pam.d/common-auth || true
      changed_when: false
      ignore_errors: true

    - name: "13.2 | Remover nullok de common-password"
      shell: sed -i 's/\s*nullok//g' /etc/pam.d/common-password || true
      changed_when: false
      ignore_errors: true

    # =========================================================
    # SECTION 14 | Permisos archivos sistema — CIS 33044
    # =========================================================
    - name: "14.1 | Permisos archivos criticos"
      file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/etc/passwd", owner: "root", group: "root", mode: "0644" }
        - { path: "/etc/shadow", owner: "root", group: "shadow", mode: "0640" }
        - { path: "/etc/group", owner: "root", group: "root", mode: "0644" }
        - { path: "/etc/gshadow", owner: "root", group: "shadow", mode: "0640" }
        - { path: "/etc/passwd-", owner: "root", group: "root", mode: "0600" }
        - { path: "/etc/shadow-", owner: "root", group: "root", mode: "0600" }
        - { path: "/etc/group-", owner: "root", group: "root", mode: "0600" }
        - { path: "/etc/gshadow-", owner: "root", group: "root", mode: "0600" }
      ignore_errors: true

    # =========================================================
    # SECTION 15 | auditd + 40 reglas CIS — CIS 33245, 33253-33272
    # =========================================================
    - name: "15.1 | Instalar auditd"
      shell: apt-get install -y auditd audispd-plugins
      changed_when: false
      ignore_errors: true

    - name: "15.1.1 | dpkg repair post auditd"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "15.2 | Desplegar auditd.conf CIS"
      copy:
        src: files/auditd.conf
        dest: /etc/audit/auditd.conf
        owner: root
        group: root
        mode: '0640'
      notify: Restart auditd

    - name: "15.3 | Desplegar reglas CIS audit (40+ reglas)"
      copy:
        dest: /etc/audit/rules.d/cis.rules
        owner: root
        group: root
        mode: '0640'
        content: |
          # =============================================================
          # Drakos Cave SOC — CIS Audit Rules v7d
          # =============================================================

          # Time changes
          -a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change
          -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time-change
          -a always,exit -F arch=b64 -S clock_settime -k time-change
          -a always,exit -F arch=b32 -S clock_settime -k time-change
          -w /etc/localtime -p wa -k time-change

          # Identity
          -w /etc/group -p wa -k identity
          -w /etc/passwd -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/security/opasswd -p wa -k identity

          # System locale
          -a always,exit -F arch=b64 -S sethostname -S setdomainname -k system-locale
          -a always,exit -F arch=b32 -S sethostname -S setdomainname -k system-locale
          -w /etc/issue -p wa -k system-locale
          -w /etc/issue.net -p wa -k system-locale
          -w /etc/hosts -p wa -k system-locale
          -w /etc/network -p wa -k system-locale

          # Logins and sessions
          -w /var/log/faillog -p wa -k logins
          -w /var/log/lastlog -p wa -k logins
          -w /var/log/tallylog -p wa -k logins
          -w /var/run/utmp -p wa -k session
          -w /var/log/wtmp -p wa -k logins
          -w /var/log/btmp -p wa -k logins

          # Permission modifications
          -a always,exit -F arch=b64 -S chmod -S fchmod -S fchmodat -k perm_mod
          -a always,exit -F arch=b32 -S chmod -S fchmod -S fchmodat -k perm_mod
          -a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown -k perm_mod
          -a always,exit -F arch=b32 -S chown -S fchown -S fchownat -S lchown -k perm_mod
          -a always,exit -F arch=b64 -S setxattr -S lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -k perm_mod
          -a always,exit -F arch=b32 -S setxattr -S lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -k perm_mod

          # Unauthorized access attempts
          -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -k access
          -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -k access
          -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -k access
          -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -k access

          # Mounts
          -a always,exit -F arch=b64 -S mount -k mounts
          -a always,exit -F arch=b32 -S mount -k mounts

          # File deletion
          -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -k delete
          -a always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -k delete

          # Sudoers
          -w /etc/sudoers -p wa -k scope
          -w /etc/sudoers.d/ -p wa -k scope

          # Sudo log
          -w /var/log/sudo.log -p wa -k actions

          # Make config immutable — MUST be last
          -e 2
      notify: Restart auditd

    - name: "15.4 | Habilitar auditd"
      shell: systemctl enable auditd || true && systemctl restart auditd || true
      changed_when: false

    # =========================================================
    # SECTION 16 | rsyslog + journal — CIS 33229, 33236-33237
    # =========================================================
    - name: "16.1 | Instalar rsyslog"
      shell: apt-get install -y rsyslog
      changed_when: false
      ignore_errors: true

    - name: "16.1.1 | dpkg repair post rsyslog"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: "16.2 | Crear rsyslog.conf si no existe"
      shell: |
        if [ ! -f /etc/rsyslog.conf ]; then
          cat > /etc/rsyslog.conf << 'RSYSEOF'
        module(load="imuxsock")
        module(load="imklog")
        *.info;mail.none;authpriv.none;cron.none  /var/log/messages
        authpriv.*                                /var/log/secure
        mail.*                                    /var/log/maillog
        cron.*                                    /var/log/cron
        *.emerg                                   :omusrmsg:*
        RSYSEOF
        fi
      changed_when: false

    - name: "16.3 | rsyslog FileCreateMode"
      lineinfile:
        path: /etc/rsyslog.conf
        regexp: '^\$FileCreateMode'
        line: "$FileCreateMode 0640"
        create: true

    - name: "16.4 | Habilitar rsyslog"
      shell: systemctl enable rsyslog || true && systemctl restart rsyslog || true
      changed_when: false

    - name: "16.5 | journald Storage=persistent"
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: "Storage=persistent"
        create: true

    - name: "16.6 | journald Compress=yes"
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Compress='
        line: "Compress=yes"
        create: true

    - name: "16.7 | journald ForwardToSyslog=yes"
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?ForwardToSyslog='
        line: "ForwardToSyslog=yes"
        create: true

    # =========================================================
    # SECTION 18 | Shell timeout + core dumps
    # (NOTE: Section 17/AIDE is now in Play 2)
    # =========================================================
    - name: "18.1 | Shell timeout TMOUT=900"
      copy:
        dest: /etc/profile.d/cis-timeout.sh
        content: |
          # CIS — Shell timeout 15 minutos
          readonly TMOUT=900
          export TMOUT
        owner: root
        group: root
        mode: '0644'

    - name: "18.2 | Core dumps — limits.conf"
      lineinfile:
        path: /etc/security/limits.conf
        regexp: '^\*.*hard.*core'
        line: "* hard core 0"
        create: true

    - name: "18.3 | Core dumps — sysctl"
      lineinfile:
        path: /etc/sysctl.d/99-cis-coredump.conf
        regexp: '^fs\.suid_dumpable'
        line: "fs.suid_dumpable = 0"
        create: true

    - name: "18.4 | Aplicar sysctl coredump"
      shell: sysctl -w fs.suid_dumpable=0
      changed_when: false

    # =========================================================
    # SECTION 19 | Validaciones finales
    # =========================================================
    - name: "19.1 | Verificar cuentas UID 0 extra"
      shell: awk -F':' '($3 == 0) { print $1 }' /etc/passwd | grep -v '^root$'
      register: uid0_check
      ignore_errors: true
      changed_when: false

    - name: "19.2 | Resultado UID 0"
      debug:
        msg: >
          {{ 'PASS — Solo root tiene UID 0' if uid0_check.stdout == '' else
             'WARNING — Cuentas extra con UID 0: ' + uid0_check.stdout }}

    - name: "19.3 | Validar SSH final"
      shell: sshd -t
      register: sshd_validate
      ignore_errors: true
      changed_when: false

    - name: "19.4 | Resultado SSH final"
      debug:
        msg: "SSH final: {{ 'VALID' if sshd_validate.rc == 0 else 'ERROR — Revisar sshd_config' }}"

    - name: "19.5 | Hardening CIS v7d completado"
      debug:
        msg: |
          ===============================================
          DRAKOS CAVE SOC — Hardening COMPLETADO
          ===============================================
          Host:     {{ inventory_hostname }}
          OS:       {{ ansible_distribution }} {{ ansible_distribution_version }}
          Fecha:    {{ ansible_date_time.iso8601 }}
          Version:  v7d
          ===============================================

# #############################################################
# PLAY 2 — AIDE INITIALIZATION (Section 17)
# Separate play so failures NEVER abort other hosts
# #############################################################
- name: "AIDE Initialization v7d (CIS 33284)"
  hosts: linux_servers
  become: true
  gather_facts: false
  serial: "30%"
  max_fail_percentage: 100
  ignore_unreachable: true
  tags:
    - aide

  tasks:
    # =========================================================
    # SECTION 17 | AIDE — CIS 33284
    # =========================================================
    - name: "17.1 | Instalar AIDE"
      shell: apt-get install -y aide aide-common
      changed_when: false
      ignore_errors: true
      tags: [aide]

    - name: "17.1.1 | dpkg repair post AIDE"
      shell: dpkg --configure -a && systemctl daemon-reload
      changed_when: false
      ignore_errors: true
      tags: [aide]

    - name: "17.2 | Crear directorio exclusiones AIDE"
      shell: mkdir -p /etc/aide/aide.conf.d
      changed_when: false
      ignore_errors: true
      tags: [aide]

    - name: "17.2.1 | Desplegar exclusiones AIDE (reduce tiempo init)"
      copy:
        dest: /etc/aide/aide.conf.d/99-cis-exclusions.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          # =============================================================
          # Drakos Cave SOC — AIDE Exclusions v7d
          # Excluir directorios pesados para acelerar aideinit
          # =============================================================
          !/proc
          !/sys
          !/dev
          !/run
          !/tmp
          !/var/tmp
          !/var/lib/docker
          !/var/log/journal
          !/var/cache/apt
          !/snap
      ignore_errors: true
      tags: [aide]

    - name: "17.3 | Verificar si AIDE DB ya existe"
      shell: test -f /var/lib/aide/aide.db || test -f /var/lib/aide/aide.db.gz
      register: aide_db_exists
      ignore_errors: true
      changed_when: false
      tags: [aide]

    - name: "17.4 | Inicializar AIDE (async fire-and-forget — max 45 min)"
      shell: aideinit --yes --force || aide --init || true
      async: 2700
      poll: 0
      register: aide_init_job
      when: aide_db_exists.rc != 0
      tags: [aide, aide_init]

    - name: "17.5 | Esperar AIDE init (polling cada 30s, max 90 reintentos)"
      async_status:
        jid: "{{ aide_init_job.ansible_job_id }}"
      register: aide_result
      until: aide_result.finished
      retries: 90
      delay: 30
      when:
        - aide_db_exists.rc != 0
        - aide_init_job is defined
        - aide_init_job.ansible_job_id is defined
      ignore_errors: true
      tags: [aide, aide_init]

    - name: "17.6 | Copiar base de datos AIDE"
      shell: >
        cp /var/lib/aide/aide.db.new /var/lib/aide/aide.db 2>/dev/null ||
        cp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz 2>/dev/null ||
        true
      changed_when: false
      ignore_errors: true
      tags: [aide]

    - name: "17.7 | Resultado AIDE"
      debug:
        msg: >
          AIDE en {{ inventory_hostname }}:
          {{ 'DB ya existia — SKIP' if aide_db_exists.rc == 0 else
             ('Init completado OK' if (aide_result is defined and aide_result.finished | default(false)) else
              'Init en progreso o timeout — verificar manualmente con: aideinit status') }}
      tags: [aide]
