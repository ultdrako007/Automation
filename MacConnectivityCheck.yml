---
- name: Validar Conectividad macOS
  hosts: all
  gather_facts: true

  tasks:
    - name: Verificar que el sistema es macOS
      fail:
        msg: "Este playbook solo funciona en macOS"
      when: ansible_os_family != "Darwin"

    - name: Verificar conectividad
      ping:

    - name: Obtener información del sistema
      command: sw_vers
      register: sysinfo
      changed_when: false

    - name: Obtener espacio en disco
      command: df -h /
      register: disk_info
      changed_when: false

    - name: Obtener memoria
      command: vm_stat
      register: mem_info
      changed_when: false

    - name: Reporte de conectividad
      debug:
        msg:
          - "================================"
          - "Host        : {{ inventory_hostname }}"
          - "OS          : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Hostname    : {{ ansible_hostname }}"
          - "IP          : {{ ansible_default_ipv4.address | default('N/A') }}"
          - "Arquitectura: {{ ansible_architecture }}"
          - "Python      : {{ ansible_python_version }}"
          - "Kernel      : {{ ansible_kernel }}"
          - "Uptime      : {{ (ansible_uptime_seconds // 3600) }}h {{ ((ansible_uptime_seconds % 3600) // 60) }}m"
          - "Conectado   : ✓"
          - "================================"
